<!DOCTYPE html>
<html>
<head>
<title>jubeiscroll's Community Hub</title>

<!-- Makes the page scale correctly on phones -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial, sans-serif;
background:#111;
color:white;
text-align:center;
margin:0;
padding:20px;
}

/* Navigation bar */
nav{
background:#222;
padding:15px;
display:flex;
flex-wrap:wrap;
justify-content:center;
}

/* Navigation buttons */
nav button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:8px;
}

/* Main buttons */
button{
padding:15px;
margin:10px;
font-size:18px;
cursor:pointer;
border:none;
border-radius:8px;
}

/* Video container so it resizes on phones */
.video-container{
position:relative;
width:100%;
max-width:800px;
margin:auto;
padding-bottom:56.25%;
height:0;
}

.video-container iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* PHONE OPTIMIZATION */
@media (max-width:600px){

h1{
font-size:28px;
}

h2{
font-size:22px;
}

nav button{
width:90%;
font-size:18px;
}

button{
width:90%;
font-size:20px;
}

}

</style>

</head>

<body>

<nav>
<button onclick="location.href='index.html'">Home</button>
<button onclick="location.href='about.html'">About Me</button>
<button onclick="location.href='comments.html'">Comments</button>

</nav>

</a>

<button>Join My Discord</button>
</a>

<h2>Latest Video</h2>

<div class="video-container">
<iframe
src="https://www.youtube.com/watch?v=xpdNLV3tUXA"
frameborder="0"
allowfullscreen>
</iframe>
</div>

</body>
</html>
