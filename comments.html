<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comments</title>
<style>
body { font-family: Arial; padding: 20px; background:#111; color:white; text-align:center; }
nav{ background:#111; padding:15px; margin-bottom:20px; }
nav button{ padding:10px 20px; margin:5px; font-size:16px; cursor:pointer; }
#comments-section { max-width: 600px; margin: auto; }
#comment-input { width: 100%; height: 60px; padding: 10px; margin-bottom: 10px; }
#post-comment-btn { padding: 10px 20px; margin-bottom: 20px; }
#comments-list { margin-top: 20px; }
.comment { border-bottom: 1px solid #ddd; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
.comment-text { flex: 1; }
.comment-buttons { display: flex; gap: 10px; }
.like-btn, .dislike-btn, .delete-btn { cursor: pointer; padding: 5px 10px; }
.active { font-weight: bold; color: green; }
</style>
</head>
<body>

<!-- Navigation Bar -->
<nav>
  <button onclick="location.href='index.html'">Home</button>
  <button onclick="location.href='about.html'">About</button>
  <button onclick="location.href='comments.html'">Comments</button>
  <button onclick="location.href='signin.html'">Sign In</button>
</nav>

<div id="comments-section">
  <h2>Comments</h2>

  <input type="email" id="user-email" placeholder="Enter your email">
  <textarea id="comment-input" placeholder="Write a comment..."></textarea>
  <button id="post-comment-btn">Post Comment</button>
  <div id="comments-list"></div>
</div>

<script>
const commentInput = document.getElementById('comment-input');
const postCommentBtn = document.getElementById('post-comment-btn');
const commentsList = document.getElementById('comments-list');
const userEmailInput = document.getElementById('user-email');
const OWNER_EMAIL = "howardkieran687@gmail.com";

let comments = JSON.parse(localStorage.getItem('comments')) || [];
let currentUserEmail = localStorage.getItem('currentUser') || '';
userEmailInput.value = currentUserEmail;

userEmailInput.addEventListener('change', () => {
  currentUserEmail = userEmailInput.value.trim();
  localStorage.setItem('currentUser', currentUserEmail);
  renderComments();
});

function renderComments() {
  commentsList.innerHTML = '';
  comments.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'comment';

    const textDiv = document.createElement('div');
    textDiv.className = 'comment-text';
    textDiv.textContent = `${c.userEmail}: ${c.text}`;

    const buttonsDiv = document.createElement('div');
    buttonsDiv.className = 'comment-buttons';

    const likeBtn = document.createElement('button');
    likeBtn.className = 'like-btn';
    likeBtn.textContent = `👍 ${c.likes}`;
    if(c.userVote==='like') likeBtn.classList.add('active');
    likeBtn.addEventListener('click', () => {
      if(!currentUserEmail) return alert("Enter your email first!");
      if(c.userVote==='like'){ c.likes--; c.userVote=null; }
      else if(c.userVote==='dislike'){ c.likes++; c.dislikes--; c.userVote='like'; }
      else{ c.likes++; c.userVote='like'; }
      saveData(); renderComments();
    });

    const dislikeBtn = document.createElement('button');
    dislikeBtn.className='dislike-btn';
    dislikeBtn.textContent=`👎 ${c.dislikes}`;
    if(c.userVote==='dislike') dislikeBtn.classList.add('active');
    dislikeBtn.addEventListener('click', ()=>{
      if(!currentUserEmail) return alert("Enter your email first!");
      if(c.userVote==='dislike'){ c.dislikes--; c.userVote=null; }
      else if(c.userVote==='like'){ c.dislikes++; c.likes--; c.userVote='dislike'; }
      else{ c.dislikes++; c.userVote='dislike'; }
      saveData(); renderComments();
    });

    if(currentUserEmail===c.userEmail || currentUserEmail===OWNER_EMAIL){
      const deleteBtn = document.createElement('button');
      deleteBtn.className='delete-btn';
      deleteBtn.textContent='🗑️';
      deleteBtn.addEventListener('click', ()=>{
        comments.splice(i,1); saveData(); renderComments();
      });
      buttonsDiv.appendChild(deleteBtn);
    }

    buttonsDiv.appendChild(likeBtn);
    buttonsDiv.appendChild(dislikeBtn);

    div.appendChild(textDiv);
    div.appendChild(buttonsDiv);
    commentsList.appendChild(div);
  });
}

function saveData(){ localStorage.setItem('comments',JSON.stringify(comments)); }

postCommentBtn.addEventListener('click', ()=>{
  const text=commentInput.value.trim();
  if(!currentUserEmail) return alert("Enter your email first!");
  if(!text) return alert("Comment cannot be empty!");
  comments.push({ text, likes:0, dislikes:0, userVote:null, userEmail:currentUserEmail });
  commentInput.value='';
  saveData(); renderComments();
});

renderComments();
</script>

</body>
</html>
